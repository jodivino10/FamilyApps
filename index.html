<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyLOVE</title>
</head>
<body style="margin:0; padding:0; font-family:sans-serif; background-color:#f0f2f5;">

    <!-- NAVBAR & TABS -->
    <div style="background-color:#ffffff; border-bottom:1px solid #e5e5e5; position:sticky; top:0; z-index:9999; text-align:center;">
        <h1 style="color:#1877f2; margin:10px 0 5px 0; font-size:24px;">JHANEEZ</h1>
        <div style="display:flex; font-size:12px; font-weight:bold; border-top:1px solid #f0f2f5;">
            <button onclick="document.getElementById('c-jh').style.display='block'; document.getElementById('c-msg').style.display='none'; document.getElementById('c-alb').style.display='none';" style="flex:1; padding:15px 0; background:#e7f3ff; border:none; color:#1877f2; font-weight:bold; cursor:pointer;">JHANEEZ</button>
            <button onclick="document.getElementById('c-jh').style.display='none'; document.getElementById('c-msg').style.display='block'; document.getElementById('c-alb').style.display='none';" style="flex:1; padding:15px 0; background:none; border:none; color:#606770; font-weight:bold; cursor:pointer;">MESSAGE</button>
            <button onclick="document.getElementById('c-jh').style.display='none'; document.getElementById('c-msg').style.display='none'; document.getElementById('c-alb').style.display='block';" style="flex:1; padding:15px 0; background:none; border:none; color:#606770; font-weight:bold; cursor:pointer;">ALBUMS</button>
        </div>
    </div>

    <!-- MAIN BOX -->
    <div style="max-width:500px; margin:0 auto; padding:16px; box-sizing:border-box;">
        
        <!-- JHANEEZ TAB -->
        <div id="c-jh" style="display:block;">
            <div style="background:#ffffff; padding:16px; border-radius:8px; border:1px solid #e5e5e5; margin-bottom:16px;">
                <input type="text" id="post-text" placeholder="Ano ang alaala ni Jhaneez ngayon?" style="width:100%; padding:12px; background:#f0f2f5; border:none; border-radius:20px; box-sizing:border-box; outline:none; margin-bottom:10px;">
                <button onclick="let t=document.getElementById('post-text').value; if(t){ document.getElementById('feed').innerHTML='<div style=\'background:#ffffff; padding:16px; border-radius:8px; border:1px solid #e5e5e5; margin-bottom:10px;\'><b>JHANEEZ ⭐</b><p style=\'margin:5px 0 0 0;\'>'+t+'</p></div>'+document.getElementById('feed').innerHTML; document.getElementById('post-text').value=''; }" style="width:100%; background:#1877f2; color:white; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer;">I-post ang Alaala</button>
            </div>
            <div id="feed"></div>
        </div>

        <!-- MESSAGE TAB -->
        <div id="c-msg" style="display:none;">
            <div style="background:#ffffff; padding:16px; border-radius:8px; border:1px solid #e5e5e5; margin-bottom:16px;">
                <select id="sender" style="width:100%; padding:10px; background:#f0f2f5; border:none; border-radius:6px; font-weight:bold; margin-bottom:10px;"><option>Papa 👨</option><option>Mama 👩</option><option>Kuya 👦</option></select>
                <textarea id="msg-text" placeholder="Isulat ang mensahe..." style="width:100%; padding:12px; background:#f0f2f5; border:none; border-radius:6px; box-sizing:border-box; outline:none; margin-bottom:10px;" rows="3"></textarea>
                <button onclick="let s=document.getElementById('sender').value; let m=document.getElementById('msg-text').value; if(m){ document.getElementById('m-list').innerHTML='<div style=\'background:#ffffff; padding:16px; border-radius:8px; border:1px solid #e5e5e5; margin-bottom:10px;\'><b style=\'color:#8a3ab9;\'>'+s+' 📝</b><p style=\'margin:5px 0 0 0;\'>'+m+'</p></div>'+document.getElementById('m-list').innerHTML; document.getElementById('msg-text').value=''; }" style="width:100%; background:#1877f2; color:white; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer;">I-send ang Mensahe</button>
            </div>
            <div id="m-list"></div>
        </div>

        <!-- ALBUMS TAB -->
        <div id="c-alb" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h3 style="margin:0;">Family Folders</h3>
                <button onclick="let n=prompt('Album Name:'); if(n){ document.getElementById('a-list').innerHTML+='<div style=\'background:#ffffff; padding:20px; border-radius:8px; border:2px solid #f1c40f; text-align:center; font-weight:bold;\'>📁<br>'+n+'</div>'; }" style="background:#42b72a; color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:bold; cursor:pointer;">+ Create Album</button>
            </div>
            <div id="a-list" style="display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;"></div>
        </div>

    </div>

</body>
</html>
