<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larong Hulaan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            padding: 20px;
        }
        h2 {
            color: #333;
        }
        .larawan-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .box {
            position: relative;
            width: 100px;
            height: 100px;
            cursor: pointer;
        }
        /* Dito mo ilalagay ang hitsura ng mga kahon habang wala pang totoong litrato */
        .box img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: 3px solid #ccc;
            object-fit: cover;
        }
        /* Ito ang berdeng checkmark na lalabas kapag tama ang pinindot */
        .checkmark {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 255, 0, 0.4);
            color: white;
            font-size: 50px;
            font-weight: bold;
            line-height: 100px;
            border-radius: 10px;
        }
        #mensahe {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <h2>1. Sino ang anak ko na mabait?</h2>
    
    <div class="larawan-container">
        <!-- Larawan 1 (Maling Sagot) -->
        <div class="box" onclick="piliin('mali', 1)">
            <img src="https://picsum.photos" alt="Anak 1">
            <div id="check1" class="checkmark">✓</div>
        </div>

        <!-- Larawan 2 (Tamang Sagot) -->
        <div class="box" onclick="piliin('tama', 2)">
            <img src="https://picsum.photos" alt="Anak 2">
            <div id="check2" class="checkmark">✓</div>
        </div>

        <!-- Larawan 3 (Maling Sagot) -->
        <div class="box" onclick="piliin('mali', 3)">
            <img src="https://picsum.photos" alt="Anak 3">
            <div id="check3" class="checkmark">✓</div>
        </div>
    </div>

    <div id="mensahe"></div>

    <script>
        function piliin(status, numero) {
            // Kung tama ang pinindot, lalabas ang checkmark at mensahe
            if (status === 'tama') {
                document.getElementById('check' + numero).style.display = 'block';
                document.getElementById('mensahe').innerText = "Magaling! Tama ang sagot mo! 🎉";
                document.getElementById('mensahe').style.color = "green";
            } else {
                // Kung mali, walang checkmark at sasabihin ng program na subukan ulit
                document.getElementById('mensahe').innerText = "Mali, subukan mo ulit! ❌";
                document.getElementById('mensahe').style.color = "red";
            }
        }
    </script>

</body>
</html>
