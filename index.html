<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyLOVE</title>
    <!-- Tailwind CSS para sa mabilis at magandang design -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl flex flex-col">
        
        <!-- 1. HEADER NAVBAR -->
        <header class="bg-white px-4 py-3 flex justify-between items-center border-b border-gray-200">
            <h1 class="text-2xl font-black text-blue-600 tracking-tight">FamilyLOVE</h1>
            <div class="flex gap-4 text-gray-500 text-xl">
                <button>⚙️</button>
                <button>🚪</button>
            </div>
        </header>

        <!-- 2. CLICKABLE NAVIGATION TABS -->
        <nav class="bg-white flex border-b border-gray-200 text-sm font-bold sticky top-0 z-10">
            <button onclick="switchTab('JHANEEZ')" id="tab-JHANEEZ" class="flex-1 text-center py-3 text-blue-600 border-b-4 border-blue-600 transition-all">
                JHANEEZ
            </button>
            <button onclick="switchTab('MESSAGE')" id="tab-MESSAGE" class="flex-1 text-center py-3 text-gray-500 hover:bg-gray-50 transition-all">
                MESSAGE
            </button>
            <button onclick="switchTab('PARENTS')" id="tab-PARENTS" class="flex-1 text-center py-3 text-gray-500 hover:bg-gray-50 transition-all">
                PARENTS
            </button>
            <button onclick="switchTab('KUYA')" id="tab-KUYA" class="flex-1 text-center py-3 text-gray-500 hover:bg-gray-50 transition-all">
                KUYA
            </button>
        </nav>

        <!-- 3. MAIN CONTENTS CONTAINER -->
        <main class="flex-1 p-4 flex flex-col justify-between">
            
            <!-- VIEW A: ALBUMS SECTION (Para sa Jhaneez, Parents, at Kuya) -->
            <div id="albums-section" class="flex flex-col flex-1">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="section-title" class="text-xl font-extrabold text-gray-800 tracking-tight">JHANEEZ SPACE</h2>
                    <button onclick="createAlbum()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-sm px-4 py-2 rounded-full shadow-md flex items-center gap-1 transition-all active:scale-95">
                        ✨ Create Album
                    </button>
                </div>

                <!-- Dito Awtomatikong Papasok ang mga Album Grid o Empty State -->
                <div id="albums-container" class="flex flex-col flex-1 justify-center">
                    <!-- Default Empty State -->
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 flex flex-col items-center justify-center text-center">
                        <span class="text-5xl mb-3">📸</span>
                        <h3 class="text-lg font-bold text-gray-700">No Album Yet</h3>
                        <p class="text-gray-400 text-xs mt-2 px-4 max-w-xs">
                            Pindutin ang "Create Album" sa itaas para mag-ayos ng mga alaala.
                        </p>
                    </div>
                </div>
            </div>

            <!-- VIEW B: MESSENGER SECTION (Nakatago sa simula, lalabas kapag pinindot ang MESSAGE tab) -->
            <div id="messenger-section" class="hidden flex flex-col flex-1 bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden h-[500px]">
                <!-- Chat Head -->
                <div class="bg-blue-600 p-3 text-white flex items-center gap-3 shadow-sm">
                    <div class="w-9 h-9 bg-blue-400 rounded-full flex items-center justify-center font-bold text-sm">🏠</div>
                    <div>
                        <h3 class="font-black text-sm">Family Chatroom</h3>
                        <p class="text-[10px] text-blue-200">Active now</p>
                    </div>
                </div>

                <!-- Chat Box Area -->
                <div id="chat-messages" class="flex-1 p-3 overflow-y-auto space-y-3 bg-gray-50 flex flex-col">
                    <!-- Default FB Messenger Sample Chats -->
                    <div class="flex flex-col max-w-[75%] self-start items-start">
                        <span class="text-[10px] font-bold text-gray-500 mb-0.5 ml-1">Mama</span>
                        <div class="px-4 py-2.5 rounded-2xl text-sm bg-white text-gray-800 rounded-tl-none border border-gray-100 shadow-sm">Anak, uwi ka na ba?</div>
                        <span class="text-[9px] text-gray-400 mt-0.5 px-1">11:30 PM</span>
                    </div>
                    <div class="flex flex-col max-w-[75%] self-end items-end">
                        <div class="px-4 py-2.5 rounded-2xl text-sm bg-blue-600 text-white rounded-tr-none shadow-sm">Opo Ma, pauwi na po kami ni Kuya.</div>
                        <span class="text-[9px] text-gray-400 mt-0.5 px-1">11:32 PM</span>
                    </div>
                </div>

                <!-- Chat Input Form -->
                <form id="chat-form" onsubmit="sendMessage(event)" class="p-2.5 border-t border-gray-100 bg-white flex gap-2">
                    <input id="chat-input" type="text" placeholder="Aa" autocomplete="off" class="flex-1 bg-gray-100 px-4 py-2 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-full w-9 h-9 flex items-center justify-center shadow-md transition-all active:scale-90">🚀</button>
                </form>
            </div>

        </main>
    </div>

    <!-- 4. LOGIC ENGINE (JAVASCRIPT) -->
    <script>
        // Imbakan ng data habang binabasa ang website sa browser
        let currentTab = 'JHANEEZ';
        let albumsData = {
            JHANEEZ: [],
            PARENTS: [],
            KUYA: []
        };

        // Function para sa pagpapalit ng Tabs
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Ayusin ang itsura ng mga Tab Buttons (Active vs Inactive)
            ['JHANEEZ', 'MESSAGE', 'PARENTS', 'KUYA'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    btn.className = "flex-1 text-center py-3 text-blue-600 border-b-4 border-blue-600 transition-all";
                } else {
                    btn.className = "flex-1 text-center py-3 text-gray-500 hover:bg-gray-50 transition-all";
                }
            });

            // Ipakita ang tamang Section sa screen
            const albumsSection = document.getElementById('albums-section');
            const messengerSection = document.getElementById('messenger-section');

            if (tabName === 'MESSAGE') {
                albumsSection.classList.add('hidden');
                messengerSection.classList.remove('hidden');
                // Auto scroll pababa sa dulo ng chat box
                const chatBox = document.getElementById('chat-messages');
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                albumsSection.classList.remove('hidden');
                messengerSection.classList.add('hidden');
                document.getElementById('section-title').innerText = `${tabName} SPACE`;
                renderAlbums();
            }
        }

        // Function para gumawa ng Album folder base sa kasalukuyang tao
        function createAlbum() {
            const albumName = prompt(`Maglagay ng pangalan para sa album ni ${currentTab}:`);
            if (!albumName || albumName.trim() === '') return;

            albumsData[currentTab].push({
                name: albumName.trim(),
                count: 0
            });

            renderAlbums();
        }

        // Function para mag-display ng mga album ng napiling tab
        function renderAlbums() {
            const container = document.getElementById('albums-container');
            const list = albumsData[currentTab];

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 flex flex-col items-center justify-center text-center">
                        <span class="text-5xl mb-3">📸</span>
                        <h3 class="text-lg font-bold text-gray-700">No Album Yet</h3>
                        <p class="text-gray-400 text-xs mt-2 px-4 max-w-xs">Pindutin ang "Create Album" sa itaas para mag-ayos ng mga alaala.</p>
                    </div>
                `;
            } else {
                let gridHTML = '<div class="grid grid-cols-2 gap-4 align-top self-start w-full">';
                list.forEach(album => {
                    gridHTML += `
                        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col hover:border-blue-400 transition-all cursor-pointer">
                            <span class="text-3xl mb-2">📁</span>
                            <span class="font-bold text-gray-800 truncate">${album.name}</span>
                            <span class="text-xs text-gray-400 mt-1">${album.count} photos</span>
                        </div>
                    `;
                });
                gridHTML += '</div>';
                container.innerHTML = gridHTML;
            }
        }

        // Function para mag-send ng chat message sa Messenger tab
        function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('chat-input');
            const messageText = input.value.trim();
            if (!messageText) return;

            const chatMessages = document.getElementById('chat-messages');
