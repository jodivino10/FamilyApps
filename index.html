<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Media & Memory</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
font-weight:bold;
}

body{
background:#f0f2f5;
}

.header{
background:#1877f2;
color:white;
padding:15px;
font-size:22px;
text-align:center;
position:sticky;
top:0;
z-index:1000;
}

.tabs{
display:flex;
overflow-x:auto;
background:white;
border-bottom:1px solid #ccc;
}

.tab{
flex:1;
padding:14px;
text-align:center;
cursor:pointer;
color:#555;
user-select:none;
}

.tab.active{
color:#1877f2;
border-bottom:4px solid #1877f2;
}

.page{
display:none;
padding:15px;
}

.page.active{
display:block;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 1px 5px rgba(0,0,0,.15);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1877f2;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#166fe5;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

.post{
background:white;
padding:12px;
margin-top:15px;
border-radius:10px;
box-shadow:0 1px 5px rgba(0,0,0,.1);
}

.post img{
width:100%;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="header">
Family Media & Memory
</div>

<div class="tabs">

<div class="tab active" data-page="home">
Home
</div>

<div class="tab" data-page="message">
Message
</div>

<div class="tab" data-page="parents">
Parents
</div>

<div class="tab" data-page="kuya">
Kuya's
</div>

<div class="tab" data-page="laga">
Laga
</div>

</div>

<div id="home" class="page active">

<div class="card">

<h2>Home</h2>

<p>
Welcome to our Family Media & Memory App.
</p>

</div>

</div>

<div id="message" class="page">

<div class="card">

<h2>Send Message</h2>

<select id="receiver">

<option>Papa</option>

<option>Mama</option>

<option>Kuya</option>

</select>

<textarea
id="messageText"
rows="5"
placeholder="Write your message...">
</textarea>

<input
type="file"
id="images"
multiple
accept="image/*">

<div
class="preview"
id="preview">
</div>

<button id="postBtn">
POST
</button>

</div>

<div id="posts"></div>

</div>

<div id="parents" class="page">

<div class="card">

<h2>Parents</h2>

<p>Family memories of Papa and Mama.</p>

</div>

</div>

<div id="kuya" class="page">

<div class="card">

<h2>Kuya's</h2>

<p>Kuya gallery.</p>

</div>
<script>

const tabs=document.querySelectorAll(".tab");
const pages=document.querySelectorAll(".page");

tabs.forEach(tab=>{

tab.addEventListener("click",function(){

tabs.forEach(t=>t.classList.remove("active"));

pages.forEach(p=>p.classList.remove("active"));

this.classList.add("active");

document
.getElementById(this.dataset.page)
.classList.add("active");

});

});

const images=document.getElementById("images");
const preview=document.getElementById("preview");

let selectedImages=[];

images.addEventListener("change",function(){

preview.innerHTML="";

selectedImages=[];

Array.from(this.files).forEach(file=>{

const reader=new FileReader();

reader.onload=function(e){

selectedImages.push(e.target.result);

const img=document.createElement("img");

img.src=e.target.result;

preview.appendChild(img);

}

reader.readAsDataURL(file);

});

});

const posts=document.getElementById("posts");

function savePosts(html){

localStorage.setItem("family_posts",html);

}

function loadPosts(){

const data=localStorage.getItem("family_posts");

if(data){

posts.innerHTML=data;

}

}

loadPosts();

document
.getElementById("postBtn")
.addEventListener("click",function(){

const receiver=document.getElementById("receiver").value;

const text=document
.getElementById("messageText")
.value.trim();

if(text==="" && selectedImages.length===0){

alert("Write a message or select image.");

return;

}

let html="";

html+="<div class='post'>";

html+="<div style='color:#1877f2'>To: "+receiver+"</div>";

if(text!=""){

html+="<p style='margin-top:10px'>"+text+"</p>";

}

selectedImages.forEach(img=>{

html+="<img src='"+img+"'>";

});

html+="</div>";

posts.innerHTML=html+posts.innerHTML;

savePosts(posts.innerHTML);

document.getElementById("messageText").value="";

document.getElementById("images").value="";

preview.innerHTML="";

selectedImages=[];

});

</script>

</body>
</html>
</div>

<div id="laga" class="page">

<div class="card">

<h2>Laga</h2>

<p>Laga memories.</p>

</div>

</div>
