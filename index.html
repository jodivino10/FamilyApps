<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyLOVE</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .dark-mode { background-color: #18191a; color: #e4e6eb; }
        .dark-card { background-color: #242526; border-color: #3a3b3c; }
        .tab-active { border-bottom: 3px solid #1877f2; color: #1877f2; }
    </style>
</head>
<body class="bg-[#f0f2f5] font-sans transition-colors duration-200">

    <!-- LOGIN SCREEN -->
    <div id="login-page" class="fixed inset-0 bg-[#1877f2] flex flex-col items-center justify-center p-4 z-50">
        <h1 class="text-white text-5xl font-bold mb-6 tracking-wide">FamilyLOVE</h1>
        <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm">
            <input type="text" id="username" placeholder="Username o Email" class="w-full p-3 mb-3 border border-gray-300 rounded text-black focus:outline-blue-500">
            <div class="relative mb-4">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border border-gray-300 rounded text-black focus:outline-blue-500">
                <button onclick="togglePassword()" class="absolute right-3 top-3.5 text-gray-500">
                    <i id="eye-icon" class="fa-solid fa-eye"></i>
                </button>
            </div>
            <button onclick="checkLogin()" class="w-full bg-[#1877f2] text-white p-3 rounded font-bold text-lg hover:bg-blue-600">Log In</button>
        </div>
    </div>

    <!-- MAIN APP SCREEN (HIDDEN BY DEFAULT) -->
    <div id="app-page" class="hidden min-h-screen pb-12">
        <!-- TOP NAVIGATION BAR (FB LITE STYLE) -->
        <div id="navbar" class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm transition-colors duration-200">
            <div class="flex items-center justify-between px-4 py-2">
                <span class="text-[#1877f2] text-2xl font-black tracking-wider">JHANEEZ</span>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="text-xl p-2"><i id="dark-icon" class="fa-solid fa-moon"></i></button>
                    <button onclick="showTab('admin')" class="text-gray-600 text-lg"><i class="fa-solid fa-user-gear"></i></button>
                    <button onclick="logout()" class="text-red-500 font-bold text-sm">Logout</button>
                </div>
            </div>
            <!-- TABS -->
            <div class="flex text-center font-bold text-gray-500 border-t border-gray-100 text-xs sm:text-sm">
                <button id="tab-jhaneez" onclick="showTab('jhaneez')" class="flex-1 py-3 tab-active">JHANEEZ</button>
                <button id="tab-message" onclick="showTab('message')" class="flex-1 py-3">MESSAGE</button>
                <button id="tab-parents" onclick="showTab('parents')" class="flex-1 py-3">PARENTS</button>
                <button id="tab-kuya" onclick="showTab('kuya')" class="flex-1 py-3">KUYA'S</button>
                <button id="tab-reels" onclick="showTab('reels')" class="flex-1 py-3 text-red-500"><i class="fa-solid fa-video mr-1"></i>REELS</button>
            </div>
        </div>

        <!-- MAIN CONTENT CONTAINER -->
        <div class="max-w-xl mx-auto p-4">
            
            <!-- JHANEEZ TAB -->
            <div id="content-jhaneez" class="tab-content">
                <!-- MULTIPLE UPLOAD BOX -->
                <div class="bg-white p-4 rounded-lg shadow border border-gray-200 mb-4 transition-colors duration-200 container-card">
                    <div class="flex gap-2 mb-3">
                        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">P</div>
                        <input type="text" id="feed-caption" placeholder="Ano ang alaala ni Jhaneez ngayon?" class="flex-1 bg-gray-100 rounded-full px-4 text-sm focus:outline-none text-black">
                    </div>
                    <div class="flex items-center justify-between border-t pt-3 text-gray-500 text-sm">
                        <label class="cursor-pointer hover:text-blue-500 font-semibold flex items-center gap-1">
                            <i class="fa-solid fa-images text-green-500 text-lg"></i> Photo/Video
                            <input type="file" id="feed-files" multiple accept="image/*,video/*" class="hidden" onchange="previewFiles('feed-preview')">
                        </label>
                        <select id="milestone-tag" class="bg-gray-100 p-1 rounded text-black text-xs font-semibold">
                            <option value="Standard">Standard Post</option>
                            <option value="First Steps">First Steps 👣</option>
                            <option value="First Word">First Word 🗣️</option>
                            <option value="Birthday">Birthday 🎂</option>
                            <option value="Christmas">Christmas 🎄</option>
                        </select>
                        <button onclick="postToFeed()" class="bg-[#1877f2] text-white px-4 py-1 rounded font-bold">Post</button>
                    </div>
                    <div id="feed-preview" class="grid grid-cols-3 gap-2 mt-3"></div>
                </div>
                <!-- FILTER BAR -->
                <div class="flex gap-2 mb-4 text-xs font-bold">
                    <select id="filter-year" onchange="filterTimeline()" class="bg-white p-2 rounded shadow border flex-1 text-black"><option value="All">All Years</option><option value="2026">2026</option></select>
                    <select id="filter-milestone" onchange="filterTimeline()" class="bg-white p-2 rounded shadow border flex-1 text-black"><option value="All">All Milestones</option><option value="Standard">Standard</option><option value="First Steps">First Steps</option><option value="First Word">First Word</option><option value="Birthday">Birthday</option><option value="Christmas">Christmas</option></select>
                </div>
                <!-- TIMELINE FEED -->
                <div id="jhaneez-feed" class="space-y-4"></div>
            </div>

            <!-- MESSAGE TAB -->
            <div id="content-message" class="tab-content hidden">
                <div class="bg-white p-4 rounded-lg shadow border border-gray-200 mb-4 transition-colors duration-200 container-card">
                    <span class="font-bold text-gray-700 block mb-2 container-text">Sino ang sumusulat?</span>
                    <select id="msg-sender" class="w-full p-2 mb-3 bg-gray-100 rounded text-black font-semibold">
                        <option value="Papa">Papa 👨</option>
                        <option value="Mama">Mama 👩</option>
                        <option value="Kuya">Kuya 👦</option>
                    </select>
                    <textarea id="msg-text" placeholder="Isulat ang mensahe para sa kinabukasan ni Jhaneez..." class="w-full p-3 bg-gray-100 rounded text-black focus:outline-none text-sm mb-3" rows="3"></textarea>
                    
                    <!-- TIME CAPSULE LOCK -->
                    <div class="flex items-center justify-between mb-3 border-t pt-2 text-xs font-semibold text-gray-500">
                        <label class="flex items-center gap-1">
                            <input type="checkbox" id="capsule-lock" onchange="toggleCapsuleDate()"> 🔒 Time Capsule Lock
                        </label>
                        <input type="date" id="unlock-date" class="hidden bg-gray-100 p-1 rounded text-black">
                    </div>

                    <div class="flex justify-between items-center border-t pt-3">
                        <button onclick="startVoiceRecord()" class="text-red-500 font-bold text-sm"><i class="fa-solid fa-microphone mr-1"></i>Voice Note</button>
                        <button onclick="postMessage()" class="bg-[#1877f2] text-white px-5 py-1 rounded font-bold text-sm">I-send</button>
                    </div>
                </div>
                <div id="message-list" class="space-y-4"></div>
            </div>

            <!-- PARENTS TAB -->
            <div id="content-parents" class="tab-content hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Parents Albums</h2>
                    <button onclick="createAlbum('parents')" class="bg-green-500 text-white px-3 py-1 rounded font-bold text-xs">+ Create Album</button>
                </div>
                <div id="parents-albums" class="grid grid-cols-2 gap-4"></div>
            </div>

            <!-- KUYA'S TAB -->
            <div id="content-kuya" class="tab-content hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Kuya's Albums</h2>
                    <button onclick="createAlbum('kuya')" class="bg-green-500 text-white px-3 py-1 rounded font-bold text-xs">+ Create Album</button>
                </div>
                <div id="kuya-albums" class="grid grid-cols-2 gap-4"></div>
            </div>

            <!-- REELS TAB -->
            <div id="content-reels" class="tab-content hidden space-y-4">
                <div class="bg-white p-4 rounded-lg shadow border text-center transition-colors duration-200 container-card">
                    <p class="font-bold mb-2">Manood o Mag-upload ng Family Reels 🎬</p>
                    <label class="bg-red-500 text-white px-4 py-2 rounded font-bold text-sm cursor-pointer inline-block">
                        + Mag-upload ng Short Video
                        <input type="file" accept="video/*" class="hidden" onchange="uploadReel(event)">
                    </label>
                </div>
