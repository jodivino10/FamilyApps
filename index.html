<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyLOVE - Kuya's Tab</title>
</head>
<body style="margin:0; padding:0; font-family:sans-serif; background-color:#f0f2f5;">

    <!-- TOP BAR -->
    <div style="background-color:#ffffff; border-bottom:1px solid #e5e5e5; padding:15px; text-align:center;">
        <h1 style="color:#1877f2; margin:0; font-size:24px;">FamilyLOVE</h1>
        <p style="margin:5px 0 0 0; font-size:14px; font-weight:bold; color:#606770;">👦 KUYA'S TAB</p>
    </div>

    <!-- MAIN BOX -->
    <div style="max-width:500px; margin:0 auto; padding:16px; box-sizing:border-box;">
        
        <!-- KUYA'S ALBUM CONTAINER -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3 style="margin:0;">Kuya's Albums</h3>
            <button onclick="createKuyaAlbum()" style="background:#42b72a; color:white; border:none; padding:10px 16px; border-radius:6px; font-weight:bold; cursor:pointer; font-size:14px;">+ Create Album</button>
        </div>
        
        <!-- MGA FOLDER NA LALABAS -->
        <div id="kuya-list" style="display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;"></div>

    </div>

    <script>
        function createKuyaAlbum() {
            const name = prompt('Ilagay ang pangalan ng Album para kay Kuya:');
            if(name) {
                const list = document.getElementById('kuya-list');
                list.innerHTML += `
                    <div style="background:#ffffff; padding:20px; border-radius:8px; border:2px solid #f1c40f; text-align:center; font-weight:bold; box-shadow:0 1px 2px rgba(0,0,0,0.05);">
                        <span style="font-size:32px;">📁</span><br>
                        <span style="font-size:14px; color:#1c1e21;">${name}</span>
                    </div>`;
            }
        }
    </script>
</body>
</html>
