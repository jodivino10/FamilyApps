<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larong Hulaan ng Pamilya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            padding: 20px;
        }
        /* Disenyo ng Introduction Screen */
        #intro-screen {
            max-width: 500px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e90ff;
        }
        .start-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* Itatago muna ang mismong laro sa simula */
        #game-screen {
            display: none;
        }
        h2 {
            color: #333;
        }
        .larawan-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        /* Ginawang mas malaki (140px) para mas maganda sa screen */
        .box {
            position: relative;
            width: 140px;
            height: 140px;
            cursor: pointer;
        }
        .box img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            border: 3px solid #ccc;
            object-fit: cover;
        }
        /* Berdeng checkmark */
        .checkmark {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 255, 0, 0.4);
            color: white;
            font-size: 60px;
            font-weight: bold;
            line-height: 140px;
            border-radius: 12px;
        }
        #mensahe {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 1. INTRO SCREEN -->
    <div id="intro-screen">
        <h1>🚀 SECRET MISSION!</h1>
        <p style="font-size: 18px; color: #555;">Handa ka na ba sa isang espesyal na hamon?</p>
        <p style="font-size: 16px; color: #666; line-height: 1.5;">
            Mayroon akong misyon para sa iyo ngayon. Hanapin ang pinakamabait na anak sa mundo! Patunayan ang iyong galing.
        </p>
        <button class="start-btn" onclick="simulanLaro()">START GAME 🎮</button>
    </div>

    <!-- 2. GAME SCREEN (DALAWANG ANAK LANG) -->
    <div id="game-screen">
        <h2>1. Sino ang anak ko na mabait?</h2>
        
        <div class="larawan-container">
            <!-- Larawan 1 (Maling Sagot) -->
            <div class="box" onclick="piliin('mali', 1)">
                <img src="anak1.jpg" alt="Anak 1">
                <div id="check1" class="checkmark">✓</div>
            </div>

            <!-- Larawan 2 (Tamang Sagot - Yung may hood sa pic) -->
            <div class="box" onclick="piliin('tama', 2)">
                <img src="anak2.jpg" alt="Anak 2">
                <div id="check2" class="checkmark">✓</div>
            </div>
        </div>

        <div id="mensahe"></div>
    </div>

    <script>
        function simulanLaro() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
        }

        function piliin(status, numero) {
            if (status === 'tama') {
                document.getElementById('check' + numero).style.display = 'block';
                document.getElementById('mensahe').innerText = "Magaling! Tama ang sagot mo! 🎉";
                document.getElementById('mensahe').style.color = "green";
            } else {
                document.getElementById('mensahe').innerText = "Mali, subukan mo ulit! ❌";
                document.getElementById('mensahe').style.color = "red";
            }
        }
    </script>

</body>
</html>
