<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Connect</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Family Connect</h1>
    <nav>
        <button>Home</button>
        <button>Profile</button>
        <button>Messages</button>
    </nav>
</header>


<section class="profile">
    <img src="https://via.placeholder.com/100" alt="Profile">
    <h2>My Family</h2>
    <p>Welcome to our private family social app</p>
</section>


<section class="post-box">
    <textarea placeholder="What's happening in the family?"></textarea>
    <button class="post-btn">Post</button>
</section>


<section class="feed">

    <div class="post">
        <h3>Family Member</h3>
        <p>Welcome to our new family app ❤️</p>
        <small>Just now</small>
    </div>


    <div class="post">
        <h3>Mom</h3>
        <p>Happy family day everyone!</p>
        <small>Today</small>
    </div>

</section>


<footer>
    <p>© 2026 Family Connect</p>
</footer>


<script src="script.js"></script>

</body>
</html>
